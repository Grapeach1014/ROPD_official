# @package _global_
#
# One-step, single-B300 ROPD integration smoke test.  It retains the normal
# PPO/Ray/FSDP/vLLM/reward path while minimizing GPU time and judge API usage.
#
# Required environment variables are intentionally not stored here:
#   ROPD_MODEL_PATH, ROPD_TEACHER_INDEX_PATH,
#   ANTHROPIC_AUTH_TOKEN, ANTHROPIC_BASE_URL,
#   ROPD_{TEACHER,RUBRICATOR,VERIFIER}_{PROFILE,MODEL}.

defaults:
  - ropd
  - _self_

# A local B300 smoke run does not need the Ray dashboard.  Limiting the Ray
# control-plane CPU pool also avoids a slow agent startup on large hosts.
ray_kwargs:
  ray_init:
    include_dashboard: false
    num_cpus: 4

# 384 prompt + 128 generated tokens.  This is deliberately short for a cheap
# end-to-end check, rather than a quality or learning-signal experiment.
max_model_len: 512

data:
  # The repository-provided parquet is aligned to
  # tmp/opus_teacher_index_math100_n4.jsonl by uid and canonical prompt hash.
  train_files:
    - ${oc.env:ROPD_B300_SMOKE_TRAIN_FILE,tmp/dapo-math-17k.train.teacher_index_aligned.smoke1.parquet}
  val_files:
    - ${oc.env:ROPD_B300_SMOKE_VAL_FILE,tmp/dapo-math-17k.train.teacher_index_aligned.smoke1.parquet}
  # One prompt is the minimum valid GRPO group when rollout.n=2.
  train_max_samples: 1
  val_max_samples: 1
  train_batch_size: 1
  max_prompt_length: 384
  max_response_length: 128
  filter_overlong_prompts: true
  validation_shuffle: false

actor_rollout_ref:
  actor:
    # The trainer expands this to 2 response sequences (1 prompt x n=2).
    ppo_mini_batch_size: 1
    ppo_micro_batch_size_per_gpu: 1
  ref:
    log_prob_micro_batch_size_per_gpu: 1
  rollout:
    name: vllm
    tensor_model_parallel_size: 1
    # Leave most B300 HBM to colocated FSDP actor/reference states.
    gpu_memory_utilization: 0.35
    max_num_batched_tokens: 1024
    max_model_len: ${max_model_len}
    prompt_length: ${data.max_prompt_length}
    response_length: ${data.max_response_length}
    log_prob_micro_batch_size_per_gpu: 1
    n: 2
    temperature: 1.0
    enforce_eager: true
    val_kwargs:
      n: 1
      do_sample: true
      temperature: 1.0

reward_model:
  reward_kwargs:
    ropd:
      # The index has four answers/prompt; select one to minimize judge cost.
      teacher_answer_count: 1
      max_concurrency: 1
      provider_resolution:
        overrides:
          global: {}
          teacher:
            # Must match the fingerprint stored in the supplied Claude index.
            timeout_seconds: 480
          rubricator:
            timeout_seconds: 120
            max_output_tokens: 1024
          verifier:
            timeout_seconds: 60
            max_output_tokens: 1024
      debug:
        output_dir: ${oc.env:ROPD_B300_SMOKE_DEBUG_DIR,outputs/ropd_b300_smoke/reward_debug}

trainer:
  project_name: ROPD-smoke
  group_name: ropd-b300-smoke
  experiment_name: ${oc.env:EXPERIMENT,ropd-b300-smoke}
  logger: [console]
  total_epochs: 1
  total_training_steps: 1
  val_before_train: false
  test_freq: -1
  # Avoid writing a multi-GB checkpoint for a flow-only smoke test.
  save_freq: -1
  default_local_dir: ${oc.env:ROPD_B300_SMOKE_CKPT_DIR,checkpoints/ropd_b300_smoke}/${trainer.experiment_name}
  n_gpus_per_node: 1
  nnodes: 1
  max_actor_ckpt_to_keep: 1
